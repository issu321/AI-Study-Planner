{% extends 'base.html' %}
{% block title %}Error {{ error_code }}{% endblock %}
{% block content %}
<div class="container-fluid text-center py-5">
    <div class="empty-state-icon mx-auto mb-4" style="width: 120px; height: 120px; font-size: 4rem; background: var(--danger-light); color: var(--danger);"><i class="fas fa-exclamation-triangle"></i></div>
    <h1 class="display-1 fw-bold text-danger">{{ error_code }}</h1>
    <h3 class="mb-3">{{ error_message }}</h3>
    <p class="text-muted mb-4">Something went wrong. Please try again or go back.</p>
    <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('index') }}" class="btn btn-primary btn-lg"><i class="fas fa-home me-2"></i>Go Home</a>
</div>
{% endblock %}
